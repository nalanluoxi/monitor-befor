<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <title>按天查询 - Traffic Monitor</title>
  <link rel="stylesheet" href="common.css"/>
</head>
<body>
<nav class="navbar">
  <a class="logo" href="index.html">Traffic Monitor</a>
  <a href="test-traffic.html">测试写入</a>
  <a href="types.html">Types</a>
  <a href="branch-ids.html">BranchIds</a>
  <a href="query-by-day.html" class="active">按天查询</a>
  <a href="query-by-hour.html">按小时查询</a>
  <a href="settings.html">⚙️ 配置</a>
</nav>
<div class="main">
  <div class="env-bar">
    <span class="env-label">环境：</span>
    <div class="env-switch">
      <button id="btn-test" onclick="switchEnv('test')">Test（localhost）</button>
      <button id="btn-prod" onclick="switchEnv('prod')">线上</button>
    </div>
    <span class="env-tip" id="env-tip"></span>
  </div>
  <div class="card">
    <h2>GET /monitor/queryByDay — 按天查询流量汇总</h2>
    <div class="form-row">
      <div class="form-group">
        <label>day（留空=今天）</label>
        <div id="day-picker"></div>
      </div>
      <div class="form-group">
        <label>type *</label>
        <div id="type-select"></div>
      </div>
      <div class="form-group">
        <label>&nbsp;</label>
        <button class="btn btn-primary" onclick="load()">查询</button>
      </div>
      <div id="mode-btns" class="form-group" style="display:none">
        <label>&nbsp;</label>
        <div style="display:flex;gap:6px;">
          <button id="btn-summary" class="btn btn-mode active-mode" onclick="switchMode('summary')">汇总</button>
          <button id="btn-detail"  class="btn btn-mode"             onclick="switchMode('detail')">详情</button>
        </div>
      </div>
    </div>
    <div id="loading" class="loading"><span class="spinner"></span>加载中...</div>
    <div id="alert" class="alert"></div>
  </div>
  <div id="result"></div>
</div>
<script src="common.js"></script>
<script>
const dayPicker  = new DayPicker('day-picker');
const typeSelect = new TypeSelect('type-select');

let currentMode = 'summary';
let lastData    = null;
let sortDesc    = true;

async function switchEnv(env) {
  setEnv(env);
  refreshEnvBar();
  typeSelect.reload();
  try { await helperSetEnv(env); } catch { /* helper 未运行时静默 */ }
}

function refreshEnvBar() {
  const env = getEnv();
  document.getElementById('btn-test').className = env === 'test' ? 'active-test' : '';
  document.getElementById('btn-prod').className = env === 'prod' ? 'active-prod' : '';
  const ips = loadProdIps();
  document.getElementById('env-tip').textContent =
    env === 'prod' ? (ips.length ? `共 ${ips.length} 个IP，轮询请求` : '⚠️ 未配置线上IP，将降级用 localhost') : 'localhost:9000';
}
refreshEnvBar();

async function load() {
  const day  = dayPicker.getValue();
  const type = typeSelect.getValue().trim();
  if (!type) { showAlert('alert','type 不能为空'); return; }
  const params = new URLSearchParams({ type });
  if (day) params.set('day', day);

  hideAlert('alert');
  setLoading('loading', true);
  document.getElementById('result').innerHTML = '';
  try {
    const resp = await apiFetch(`${getBase()}/monitor/queryByDay?${params}`);
    setLoading('loading', false);
    lastData = resp.body || {};
    document.getElementById('mode-btns').style.display = 'flex';
    renderByMode();
  } catch(e) {
    setLoading('loading', false);
    showAlert('alert', `请求失败: ${e.message}`);
  }
}

function renderByMode() {
  if (currentMode === 'summary') renderSummary(lastData);
  else render(lastData);
}

async function switchMode(mode) {
  currentMode = mode;
  document.getElementById('btn-summary').classList.toggle('active-mode', mode === 'summary');
  document.getElementById('btn-detail').classList.toggle('active-mode', mode === 'detail');
  if (mode === 'detail') {
    await load();
  } else {
    renderSummary(lastData);
  }
}

function toggleSort() {
  sortDesc = !sortDesc;
  renderSummary(lastData);
}

function renderSummary(data) {
  if (!data) return;
  const queryDay = data.queryDay || '';
  const slots = Object.keys(data).filter(k => k !== 'queryDay' && k !== 'all');

  // 聚合：type+branchId+dispatchTs 为 key，累加 count
  const map = new Map();
  slots.forEach(slot => {
    (data[slot] || []).forEach(r => {
      const key = `${r.type}||${r.branchId}||${r.dispatchTs}`;
      if (map.has(key)) {
        map.get(key).allCount += Number(r.count || 0);
      } else {
        map.set(key, {
          type: r.type || '',
          branchId: r.branchId || '',
          dispatchTs: r.dispatchTs || '',
          allCount: Number(r.count || 0)
        });
      }
    });
  });

  let rows = [...map.values()];
  rows.sort((a, b) => sortDesc ? b.allCount - a.allCount : a.allCount - b.allCount);

  const grandTotal = rows.reduce((s, r) => s + r.allCount, 0);
  const sortIcon   = sortDesc ? '↓' : '↑';

  let html = `
    <div class="card">
      <div class="stat-row">
        <div class="stat-box"><div class="stat-val">${escHtml(queryDay)}</div><div class="stat-lbl">查询日期</div></div>
        <div class="stat-box"><div class="stat-val">${fmtNum(grandTotal)}</div><div class="stat-lbl">全天总量</div></div>
        <div class="stat-box"><div class="stat-val">${fmtNum(rows.length)}</div><div class="stat-lbl">聚合条目数</div></div>
      </div>
    </div>`;

  if (rows.length === 0) {
    html += `<div class="card"><p style="color:#aaa;text-align:center;padding:20px">暂无数据</p></div>`;
  } else {
    html += `
      <div class="card">
        <h2>全天汇总（按 type / branchId / dispatchTs 聚合）</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>type</th>
                <th>branchId</th>
                <th>dispatchTs</th>
                <th>allCount <button class="sort-btn" onclick="toggleSort()" title="切换排序">${sortIcon}</button></th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r => `
                <tr>
                  <td>${escHtml(r.type)}</td>
                  <td>${escHtml(r.branchId)}</td>
                  <td>${fmtTs(r.dispatchTs)}</td>
                  <td class="num">${fmtNum(r.allCount)}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  }

  document.getElementById('result').innerHTML = html;
}

function fmtTs(ts) {
  if (!ts) return '';
  const s = String(ts);
  if (s.length === 10) return `${s.slice(0,4)}/${s.slice(4,6)}/${s.slice(6,8)}/${s.slice(8,10)}`;
  return s;
}

function fmtNum(n) {
  const s = String(Number(n||0));
  return s.replace(/\B(?=(\d{4})+(?!\d))/g, ',');
}

function render(data) {
  const queryDay = data.queryDay || '';
  const slots = Object.keys(data).filter(k => k !== 'queryDay' && k !== 'all');
  let grandTotal = 0;
  const allRows = data.all || [];
  allRows.forEach(r => grandTotal += Number(r.count||0));

  let html = `
    <div class="card">
      <div class="stat-row">
        <div class="stat-box"><div class="stat-val">${escHtml(queryDay)}</div><div class="stat-lbl">查询日期</div></div>
        <div class="stat-box"><div class="stat-val">${fmtNum(grandTotal)}</div><div class="stat-lbl">全天总量</div></div>
      </div>
    </div>`;

  if (slots.length === 0) {
    html += `<div class="card"><p style="color:#aaa;text-align:center;padding:20px">暂无数据</p></div>`;
  }

  slots.forEach(slot => {
    const rows = data[slot];
    if (!Array.isArray(rows) || rows.length === 0) return;
    const slotTotal = rows.reduce((s,r)=>s+Number(r.count||0),0);
    html += `
      <div class="card">
        <h2>时间槽：${fmtTs(slot)} &nbsp;<span class="tag tag-blue">合计 ${fmtNum(slotTotal)}</span></h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th>type</th><th>branchId</th><th>dispatchTs</th><th>count</th></tr></thead>
            <tbody>
              ${rows.map(r=>`
                <tr>
                  <td>${escHtml(r.type||'')}</td>
                  <td>${escHtml(r.branchId||'')}</td>
                  <td>${fmtTs(r.dispatchTs)}</td>
                  <td class="num">${fmtNum(r.count)}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  });
  document.getElementById('result').innerHTML = html;
}
</script>
</body>
</html>
