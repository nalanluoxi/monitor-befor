<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <title>按小时查询 - Traffic Monitor</title>
  <link rel="stylesheet" href="common.css"/>
</head>
<body>
<nav class="navbar">
  <a class="logo" href="index.html">Traffic Monitor</a>
  <a href="test-traffic.html">测试写入</a>
  <a href="types.html">Types</a>
  <a href="branch-ids.html">BranchIds</a>
  <a href="query-by-day.html">按天查询</a>
  <a href="query-by-hour.html" class="active">按小时查询</a>
  <a href="settings.html">⚙️ 配置</a>
</nav>
<div class="main">
  <div class="env-bar">
    <span class="env-label">环境：</span>
    <div class="env-switch">
      <button id="btn-test" onclick="switchEnv('test')">Test（localhost）</button>
      <button id="btn-prod" onclick="switchEnv('prod')">线上</button>
    </div>
    <span class="env-tip" id="env-tip"></span>
  </div>
  <div class="card">
    <h2>GET /monitor/queryByHour — 按小时查询明细</h2>
    <div class="form-row">
      <div class="form-group">
        <label>day（留空=今天）</label>
        <div id="day-picker"></div>
      </div>
      <div class="form-group">
        <label>hour（留空=当前小时）</label>
        <div id="hour-picker"></div>
      </div>
      <div class="form-group">
        <label>type *</label>
        <div id="type-select"></div>
      </div>
      <div class="form-group">
        <label>&nbsp;</label>
        <button class="btn btn-primary" onclick="load()">查询</button>
      </div>
    </div>
    <div id="loading" class="loading"><span class="spinner"></span>加载中...</div>
    <div id="alert" class="alert"></div>
  </div>
  <div id="result"></div>
</div>
<script src="common.js"></script>
<script>
const dayPicker  = new DayPicker('day-picker');
const hourPicker = new HourPicker('hour-picker');
const typeSelect = new TypeSelect('type-select');

async function switchEnv(env) {
  setEnv(env);
  refreshEnvBar();
  typeSelect.reload();
  try { await helperSetEnv(env); } catch { /* helper 未运行时静默 */ }
}

function refreshEnvBar() {
  const env = getEnv();
  document.getElementById('btn-test').className = env === 'test' ? 'active-test' : '';
  document.getElementById('btn-prod').className = env === 'prod' ? 'active-prod' : '';
  const ips = loadProdIps();
  document.getElementById('env-tip').textContent =
    env === 'prod' ? (ips.length ? `共 ${ips.length} 个IP，轮询请求` : '⚠️ 未配置线上IP，将降级用 localhost') : 'localhost:9000';
}
refreshEnvBar();

async function load() {
  const day  = dayPicker.getValue();
  const hour = hourPicker.getValue();
  const type = typeSelect.getValue().trim();
  if (!type) { showAlert('alert','type 不能为空'); return; }
  const params = new URLSearchParams({ type });
  if (day)  params.set('day', day);
  if (hour) params.set('hour', hour);

  hideAlert('alert');
  setLoading('loading', true);
  document.getElementById('result').innerHTML = '';
  try {
    const resp = await apiFetch(`${getBase()}/monitor/queryByHour?${params}`);
    setLoading('loading', false);
    render(resp.body || {});
  } catch(e) {
    setLoading('loading', false);
    showAlert('alert', `请求失败: ${e.message}`);
  }
}

function render(data) {
  const queryDay  = data.queryDay  || '';
  const queryHour = data.queryHour || '';
  const allRow    = data.all       || {};
  const items     = data.items     || [];

  let html = `
    <div class="card">
      <div class="stat-row">
        <div class="stat-box"><div class="stat-val">${escHtml(queryDay)}</div><div class="stat-lbl">查询日期</div></div>
        <div class="stat-box"><div class="stat-val">${escHtml(queryHour)} 时</div><div class="stat-lbl">查询小时</div></div>
        <div class="stat-box"><div class="stat-val">${Number(allRow.count||0).toLocaleString()}</div><div class="stat-lbl">本小时总量</div></div>
        <div class="stat-box"><div class="stat-val">${items.length}</div><div class="stat-lbl">明细条数</div></div>
      </div>
    </div>
    <div class="card">
      <h2>明细列表</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>type</th><th>branchId</th><th>dispatchTs</th><th>count</th></tr></thead>
          <tbody>
            <tr class="all-row">
              <td>ALL</td><td>ALL</td><td></td>
              <td class="num">${Number(allRow.count||0).toLocaleString()}</td>
            </tr>
            ${items.length ? items.map(r=>`
              <tr>
                <td>${escHtml(r.type||'')}</td>
                <td>${escHtml(r.branchId||'')}</td>
                <td>${escHtml(r.dispatchTs||'')}</td>
                <td class="num">${Number(r.count||0).toLocaleString()}</td>
              </tr>`).join('') : '<tr><td colspan="4" style="text-align:center;color:#aaa">暂无数据</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>`;
  document.getElementById('result').innerHTML = html;
}
</script>
</body>
</html>
