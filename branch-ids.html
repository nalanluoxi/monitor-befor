<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <title>BranchIds - Traffic Monitor</title>
  <link rel="stylesheet" href="common.css"/>
</head>
<body>
<nav class="navbar">
  <a class="logo" href="index.html">Traffic Monitor</a>
  <a href="test-traffic.html">测试写入</a>
  <a href="types.html">Types</a>
  <a href="branch-ids.html" class="active">BranchIds</a>
  <a href="query-by-day.html">按天查询</a>
  <a href="query-by-hour.html">按小时查询</a>
  <a href="settings.html">⚙️ 配置</a>
</nav>
<div class="main">
  <div class="env-bar">
    <span class="env-label">环境：</span>
    <div class="env-switch">
      <button id="btn-test" onclick="switchEnv('test')">Test（localhost）</button>
      <button id="btn-prod" onclick="switchEnv('prod')">线上</button>
    </div>
    <span class="env-tip" id="env-tip"></span>
  </div>
  <div class="card">
    <h2>GET /monitor/branchIds — 获取所有 BranchId 列表</h2>
    <button class="btn btn-primary" onclick="load()">查询</button>
    <div id="loading" class="loading"><span class="spinner"></span>加载中...</div>
    <div id="alert" class="alert"></div>
  </div>
  <div class="card" id="result-card" style="display:none">
    <h2>BranchId 列表 &nbsp;<span id="count" class="tag tag-green"></span></h2>
    <div id="tags"></div>
  </div>
</div>
<script src="common.js"></script>
<script>
async function switchEnv(env) { setEnv(env); refreshEnvBar(); try { await helperSetEnv(env); } catch {} }
function refreshEnvBar() {
  const env = getEnv();
  document.getElementById('btn-test').className = env === 'test' ? 'active-test' : '';
  document.getElementById('btn-prod').className = env === 'prod' ? 'active-prod' : '';
  const ips = loadProdIps();
  document.getElementById('env-tip').textContent =
    env === 'prod' ? (ips.length ? `共 ${ips.length} 个IP，轮询请求` : '⚠️ 未配置线上IP，将降级用 localhost') : 'localhost:9000';
}
refreshEnvBar();

async function load() {
  hideAlert('alert');
  setLoading('loading', true);
  document.getElementById('result-card').style.display = 'none';
  try {
    const data = await apiFetch(`${getBase()}/monitor/branchIds`);
    setLoading('loading', false);
    const list = data.body || [];
    document.getElementById('count').textContent = `共 ${list.length} 条`;
    document.getElementById('tags').innerHTML = list.length
      ? list.map(t => `<span class="tag tag-green">${escHtml(t)}</span>`).join('')
      : '<span style="color:#aaa">暂无数据</span>';
    document.getElementById('result-card').style.display = 'block';
  } catch(e) {
    setLoading('loading', false);
    showAlert('alert', `请求失败: ${e.message}`);
  }
}
</script>
</body>
</html>
